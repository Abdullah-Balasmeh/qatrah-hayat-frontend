<div
  class="form-inputs date-field"
  [class.focused]="isFocused"
  [class.invalid-input]="isInvalid"
>
  @if (prefixIcon) {
    <i class="prefix-icon" [class]="prefixIcon" aria-hidden="true"></i>
  } @else {
    <span class="prefix-spacer" aria-hidden="true"></span>
  }

  <input
    #dateInput
    class="text-input date-input"
    [class.date-mode]="inputType === 'date'"
    [id]="inputId"
    [type]="inputType"
    [placeholder]="placeholder"
    [formControl]="control"
    [autocomplete]="autocomplete"
    [readonly]="readonly"
    (focus)="onFocus(dateInput)"
    (blur)="onBlur()"
  />

  <button
    type="button"
    class="suffix-btn"
    aria-label="Open date picker"
    (click)="openDatePicker(dateInput)"
  >
    <i class="fas" [ngClass]="suffixIcon" aria-hidden="true"></i>
  </button>
</div>

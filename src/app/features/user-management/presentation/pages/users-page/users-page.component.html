<section class="users-page-section">
  <div class="users-page-header">
    <div>
      <h1 class="section-title">
        {{ 'Admin-Keys.USER_MANAGEMENT' | translate }}
      </h1>
    </div>

    <button class="qh-primary-btn add-user-btn">
      <i class="fa-solid fa-plus"></i>
      <span>{{ 'Admin-Keys.ADD_USER' | translate }}</span>
    </button>
  </div>

  <div class="users-card">
    <div class="users-toolbar">
      <div class="search-field">
        <app-search-bar
          [control]="searchControl"
          inputId="users-search"
          autocomplete="off"
        ></app-search-bar>
      </div>

      <div class="toolbar-actions">
        <button class="filter-btn" type="button">
          <i class="fa-solid fa-filter"></i>
          <span>{{ 'Admin-Keys.FILTER' | translate }}</span>
        </button>
      </div>
    </div>

    <div class="table-container">
      <!-- حطي جدول المستخدمين هون لاحقًا -->
      <div class="empty-table-state">
        <div class="empty-icon">
          <i class="fa-solid fa-users"></i>
        </div>

        <h2>{{ 'Admin-Keys.USERS_TABLE_TITLE' | translate }}</h2>
        <p>{{ 'Admin-Keys.USERS_TABLE_DESCRIPTION' | translate }}</p>
      </div>
    </div>
  </div>
</section>

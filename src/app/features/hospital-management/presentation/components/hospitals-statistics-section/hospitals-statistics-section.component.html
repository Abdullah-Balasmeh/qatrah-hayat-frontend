<div class="stats-grid">
  <app-stat-card
    [title]="'Hospitals-Management-Keys.TOTAL_HOSPITALS' | translate"
    [value]="totalHospitals()"
    [icon]="'fa-solid fa-hospital'"
    [colorClass]="'icon-gold'"
  ></app-stat-card>

  <app-stat-card
    [title]="'Hospitals-Management-Keys.TOTAL_ACTIVE_HOSPITALS' | translate"
    [value]="totalActiveHospitals()"
    [icon]="'fa-solid fa-house-medical-circle-check'"
    [colorClass]="'icon-navy'"
  ></app-stat-card>

  <app-stat-card
    [title]="'Hospitals-Management-Keys.TOTAL_INACTIVE_HOSPITALS' | translate"
    [value]="totalInactiveHospitals()"
    [icon]="'fa-solid fa-house-medical-circle-xmark'"
   [colorClass]="'icon-pink'"
  ></app-stat-card>

  <app-stat-card
    [title]="'Hospitals-Management-Keys.LAST_UPDATE' | translate"
    [value]="lastUpdate() || '-'"
    [icon]="'fa-solid fa-clock-rotate-left'"
   [colorClass]="'icon-green'"
  ></app-stat-card>
</div>

<section class="donate-section">
  <div class="container donate-container">
    <div class="section-heading text-center">
      <h2>{{ 'DONATE_PAGE.SECTION_TITLE' | translate }}</h2>
      <p>{{ 'DONATE_PAGE.SECTION_DESC' | translate }}</p>
    </div>

    <div class="row g-4 justify-content-center">
  <div class="col-12 col-md-6 col-xl-4" *ngFor="let item of donationTypes">
    <article class="donation-card h-100" [class.featured-card]="item.featured">
      <span class="card-badge">{{ item.badgeKey | translate }}</span>

      <div class="card-image">
        <img [src]="item.image" [alt]="item.titleKey | translate" />
      </div>

      <div class="card-content">
        <h3 class="card-title">{{ item.titleKey | translate }}</h3>
        <p class="card-text">{{ item.descKey | translate }}</p>
      </div>

      <button type="button" class="btn-qh-primary card-btn">
        {{ 'DONATE_PAGE.DONATE_NOW' | translate }}
      </button>
    </article>
  </div>
</div>
  </div>
</section>

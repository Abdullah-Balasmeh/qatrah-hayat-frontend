<header class="site-header">
  <nav class="navbar navbar-expand-lg header-navbar">
    <div class="container-fluid header-container">
      <!-- Brand / Logo -->
      <a
        class="navbar-brand header-brand"
        routerLink="/home"
        data-aos="fade-down"
        data-aos-delay="100"
      >
        <img
          [src]="
            isArabic()
              ? 'assets/images/Qatrah_Hayat_logo_ar.svg'
              : 'assets/images/Qatrah_Hayat_logo.svg'
          "
          alt="Qatrah Hayat Logo"
          class="header-logo"
        />
      </a>

      <!-- Mobile menu toggle button -->
      <button
        class="navbar-toggler header-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNavbar"
        aria-controls="mainNavbar"
        aria-expanded="false"
        aria-label="Toggle navigation"
        data-aos="fade-down"
        data-aos-delay="150"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Collapsible navbar content -->
      <div class="collapse navbar-collapse header-collapse" id="mainNavbar">
        <!-- Navigation links -->
        <ul class="navbar-nav header-nav mx-auto">
          <li
            class="nav-item"
            [attr.data-aos]="isArabic() ? 'fade-right' : 'fade-left'"
            data-aos-delay="180"
          >
            <a
              class="nav-link header-link"
              routerLink="/home"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
            >
              {{ "Landing-Header-Keys.HOME" | translate }}
            </a>
          </li>

          <li
            class="nav-item"
             [attr.data-aos]="isArabic() ? 'fade-right' : 'fade-left'"
            data-aos-delay="230"
          >
            <a
              class="nav-link header-link"
              routerLink="/donation-requests"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
            >
              {{ "Landing-Header-Keys.DONATION_REQUESTS" | translate }}
            </a>
          </li>

          <li
            class="nav-item"
            [attr.data-aos]="isArabic() ? 'fade-right' : 'fade-left'"
            data-aos-delay="280"
          >
            <a
              class="nav-link header-link"
              routerLink="/campaigns"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
            >
              {{ "Landing-Header-Keys.CAMPAIGNS" | translate }}
            </a>
          </li>

          <li
            class="nav-item"
            [attr.data-aos]="isArabic() ? 'fade-right' : 'fade-left'"
            data-aos-delay="330"
          >
            <a class="nav-link header-link" routerLink="/" fragment="about-us">
              {{ "Landing-Header-Keys.ABOUT_US" | translate }}
            </a>
          </li>

          <li
            class="nav-item"
            [attr.data-aos]="isArabic() ? 'fade-right' : 'fade-left'"
            data-aos-delay="380"
          >
            <a
              class="nav-link header-link"
              routerLink="/contact-us"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
            >
              {{ "Landing-Header-Keys.CONTACT_US" | translate }}
            </a>
          </li>
        </ul>

        <!-- Desktop actions -->
        <div class="header-actions d-none d-lg-flex">
          <button
            class="btn header-btn header-btn--outline"
            routerLink="/auth/login"
            data-aos="fade-down"
            data-aos-delay="430"
          >
            {{ "Landing-Header-Keys.LOGIN" | translate }}
          </button>

          <button
            class="btn header-btn header-btn--primary"
            routerLink="/auth/sign-up"
            data-aos="fade-down"
            data-aos-delay="480"
          >
            {{ "Landing-Header-Keys.CREATE_ACCOUNT" | translate }}
          </button>

          <button
            class="btn header-btn header-btn--lang"
            (click)="toggleLanguage()"
           data-aos="fade-down"
            data-aos-delay="530"
          >
            <i class="fa-solid fa-globe"></i>
            <span>{{ langService.currentLang === "en" ? "AR" : "EN" }}</span>
          </button>
        </div>

        <!-- Mobile actions -->
        <div class="header-mobile-actions d-lg-none">
          <button
            class="btn header-btn header-btn--outline w-100"
            routerLink="/auth/citizen-login"
            data-aos="fade-up"
            data-aos-delay="200"
          >
            {{ "Landing-Header-Keys.LOGIN" | translate }}
          </button>

          <button
            class="btn header-btn header-btn--primary w-100"
            routerLink="/auth/citizen-signup"
            data-aos="fade-up"
            data-aos-delay="260"
          >
            {{ "Landing-Header-Keys.CREATE_ACCOUNT" | translate }}
          </button>

          <button
            class="btn header-btn header-btn--lang w-100"
            (click)="toggleLanguage()"
            data-aos="fade-up"
            data-aos-delay="320"
          >
            <i class="fa-solid fa-globe"></i>
            <span>{{ isArabic() ? "EN" : "AR" }}</span>
          </button>
        </div>
      </div>
    </div>
  </nav>
</header>
